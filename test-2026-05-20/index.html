<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test — Hermes Publishing</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
  :root { --bg:#0a0d14; --surface:#111620; --border:#252d3d; --text:#e2e6ed; --text2:#8b95a8; --cyan:#06b6d4; }
  body { font-family:Inter,sans-serif; background:var(--bg); color:var(--text); display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:48px; text-align:center; max-width:500px; }
  h1 { font-size:48px; font-weight:900; background:linear-gradient(135deg,var(--cyan),#8b5cf6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  p { color:var(--text2); margin-top:8px; }
  .badge { display:inline-block; background:rgba(6,182,212,0.12); color:var(--cyan); padding:4px 14px; border-radius:100px; font-size:13px; font-weight:600; margin-top:16px; }
  .meta { font-size:12px; color:#5b6578; margin-top:24px; font-family:monospace; }
</style>
</head>
<body>
<div class="card">
  <h1>Hello</h1>
  <p>Test page published by Hermes Agent via git push.</p>
  <div class="badge">✅ Publishing Works</div>
  <div class="meta">2026-05-20 21:10 UTC · LXC 405 Docker</div>
</div>
</body>
</html>
